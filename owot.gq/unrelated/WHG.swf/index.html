<!DOCTYPE html>
<html lang="en">
  <head>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link rel="icon" href="https://cdn.discordapp.com/attachments/817456773996740670/1043226365559845024/image.png" />
    <title>World's Hardest Game</title>

    <script src='https://e9x.github.io/ruffle-example/ruffle.js'></script>
    
  </head>
  <body>

        <div id='ruffle'></div>
        <script>
var swfobject = {};

swfobject.embedSWF = function(url, cont, width, height){
    var ruffle = window.RufflePlayer.newest(),
        player = Object.assign(document.getElementById(cont).appendChild(ruffle.createPlayer()), {
            width: width,
            height: height,
            style: 'width: ' + width + 'px; height: ' + height + 'px',
        });
    
    player.load({ url: url });
}

swfobject.embedSWF('theworldshardestgame.swf', 'ruffle', 1000, 1000);
        </script>
  </body>
</html>
