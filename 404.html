    <script>

        const subs = [
            {start: 2.527, end: 3.673, text: "THERE'S NOTHING"},
            {start: 3.987, end: 4.640, text: "thank you son."},
            {start: 5.313, end: 7.587, text: "i'm on that good kush and alcohol"},
            {start: 9.067, end: 10.913, text: "THERE'S NOTHING"},
            {start: 11.920, end: 12.993, text: "THERE'S N OTHING"},
            {start: 13.120, end: 13.727, text: "NOT  HING"},
            {start: 13.833, end: 14.360, text: "N OTHI NG"},
            {start: 14.487, end: 14.993, text: "N    O  T  HIN      G"},
            {start: 15.260, end: 16.007, text: "thank you      son."}
        ];
        function getsub(time) {
            for (let i = 0; i < subs.length; i++) {
                if (time >= subs[i].start && time <= subs[i].end) {
                    return subs[i].text;
                }
            }
            return null;
        }

        const video = document.querySelector(".NOTHING");
        const notice = document.querySelector(".redirect a");
        const target = window.__redirectto;

        if (target) {
            document.querySelector(".redirect").classList.remove("hidden");
            notice.textContent = "redirecting to " + target.replace(/^https?:\/\//, "") + "...";
            location.replace(target);
        } else {
            document.querySelector(".page").style.display = "flex";
            video.addEventListener("timeupdate", () => {
                const cur = video.currentTime;
                const subtext = getsub(cur);
                document.title = subtext || "﻿";
            });
            video.addEventListener("ended", () => {document.title = "﻿"});
        }

    </script>
