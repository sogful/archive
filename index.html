<!DOCTYPE html>
<html lang="en">
<head>

    <title>old sites</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="googlebot" content="index,follow">
    <meta name="google" content="notranslate">

    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            background: #111111; overflow: hidden;
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: Arial, Tahoma, sans-serif;
        }
        .bg {
            position: fixed;
            left: 0; right: 0; top: 50%; transform: translateY(-15%);
            width: 100vw; height: 100vh;
            opacity: 0.25; z-index: -1; pointer-events: none;
            background-image: url("/assets/images/cityscape.png");
            background-repeat: repeat-x;
            background-position: center center;
            image-rendering: pixelated;
            mix-blend-mode: lighten;
        }
        h1, h2, h3 {margin: 0}

        /*//////////////////////////////////////////////////////////////////////*/

        .content {
            display: flex; align-items: center; justify-content: center;
            border-radius: 18px;
            max-width: 90vw; height: 100vh;
        }

        :any-link {
            color: #eee;
            text-decoration: underline wavy #555;
        }
        .text {
            display: flex; flex-direction: column; 
            letter-spacing: -0.25px;
            line-height: 1.25; color: #eeeeee;
        }
        .text .list {
            display: flex; flex-direction: row; 
            flex-wrap: wrap; 
            column-gap: 0.75em; row-gap: 0.75em
        }
        .text .list div {display: flex; flex-direction: column}

        a {
            display: inline-block;
            transform: rotate(1.1deg);
        }
        a:nth-of-type(1) {transform: rotate(-1.0deg)} a:nth-of-type(2) {transform: rotate(1.17deg)}
        a:nth-of-type(3) {transform: rotate(-1.12deg)} a:nth-of-type(4) {transform: rotate(1.1deg)}
        a:nth-of-type(5) {transform: rotate(-1.1deg)} a:nth-of-type(6) {transform: rotate(1.13deg)}
        a:nth-of-type(7) {transform: rotate(-1.14deg)} a:nth-of-type(8) {transform: rotate(1.13deg)}
        a:nth-of-type(9) {transform: rotate(-1.18deg)} a:nth-of-type(10) {transform: rotate(1.1deg)}

        .smaller {font-size: 0.75em}
        sub {font-size: 9px; opacity: 0.5; margin-top: 0.5em}

    </style>

</head>
<body>

    <div class="bg"></div>

    <div class="content">
        <div class="text">
            <h3>archive</h3>

            <div class="list">
                <div><sub>2021 - 2022</sub>
                <a href="catsareli.gq/uid">catsareli.gq/uid</a>
                <a href="prooject.gq">prooject.gq</a>
                <a href="owot.gq">owot.gq</a></div>

                <div><sub>2024</sub>
                <a href="cbf.rf.gd">cbf.rf.gd</a></div>

                <div><sub>2025</sub>
                <a href="pawing.cv">pawing.cv</a>
                <a class="smaller">(wip frontpage by mat)</a></div>

                <div><sub>2026</sub>
                <a href="bestai">/bestai</a>
                <a class="smaller">stopped working within a month</a>
                <a href="misc/communities">/misc/communities</a>
                <a class="smaller">tweet community dumps</a></div>
            </div>

        </div>
    </div>

</body>
</html>
